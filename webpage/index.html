<html lang="en">
    <head>
        <title>%%HTML_TITLE%%</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <link rel="stylesheet" href="%%CSS_FILE%%" />
    </head>
    <body id="top">

        <!-- WiFi indicator (upper-left corner) -->
        <div id="wifiIndicator" data-level="0" role="button" tabindex="0" title="WiFi settings"
             onclick="openWifiPopup(); return false;">
            <svg id="wifiIcon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path class="wifi-arc wifi-arc-3" d="M 2.2 9.6 a 13.8 13.8 0 0 1 19.6 0" />
                <path class="wifi-arc wifi-arc-2" d="M 5.4 12.9 a 9.3 9.3 0 0 1 13.2 0" />
                <path class="wifi-arc wifi-arc-1" d="M 8.6 16.2 a 4.8 4.8 0 0 1 6.8 0" />
                <circle class="wifi-dot" cx="12" cy="19.3" r="1.7" />
            </svg>
            <span id="wifiSSIDLabel">Not connected</span>
        </div>

        <!-- Config editor indicator (upper-right corner) -->
        <div id="configIndicator" role="button" tabindex="0" title="Configuration"
             onclick="openConfigPopup(); return false;">
            <svg id="configIcon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <circle class="config-gear" cx="12" cy="12" r="3.2" />
                <path class="config-gear" d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </div>

        <section id="banner"></section>

        <!-- Main -->
        <div id="main">
            <div class="inner">

                <!-- Voice Command Status + TTS Input -->
                <div class="card" id="status-card">
                    <p id="voiceCommandStatus">Voice Command Status: <span>---</span></p>
                    <div id="ttsInputContainer">
                        <input type="text" id="ttsInput" placeholder="Type something to say…" />
                        <button id="submitTTSButton" type="button">Speak</button>
                    </div>
                </div>

                <!-- Show Controls -->
                <div class="card" id="show-card">
                    <div id="showControls">
                        <select id="showListDropdown" name="Show List" aria-label="Show list">
                            <!-- Options will be dynamically inserted here -->
                        </select>
                        <div class="button-row">
                            <button id="playButton" type="button" title="Play">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                            </button>
                            <button id="pauseButton" type="button" title="Pause">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="4" y="3" width="5" height="18" rx="1"/><rect x="15" y="3" width="5" height="18" rx="1"/></svg>
                            </button>
                            <button id="stopButton" type="button" title="Stop">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Keypad + Mirrored Mode -->
                <div class="card" id="keypad-card">
                    <img class="keypad-img" src="images/keypad-l.png" alt="Left Keypad" />
                    <div class="mode-toggle">
                        <label for="mirroredModeCheckbox">
                            <input type="checkbox" id="mirroredModeCheckbox"
                                   title="Swap animations on the right and left sides of the animatronic" />
                            Enable Mirrored Mode
                        </label>
                    </div>
                </div>

            </div>
        </div>

        <!-- WiFi Selection Popup -->
        <div id="wifiPopup" class="popup-overlay" style="display: none;">
            <div class="popup-content">
                <button id="closeWifiPopup" class="close-button">&times;</button>
                <h2>Select a WiFi Network</h2>
                <div id="wifiList" class="wifi-list">
                    <!-- Available WiFi networks will be populated here -->
                </div>
                <div class="wifi-connect">
                    <label for="wifiPassword">Password:</label>
                    <input type="password" id="wifiPassword" placeholder="Enter WiFi password" />
                    <button id="connectWifiButton">Connect</button>
                </div>
            </div>
        </div>

        <!-- Config Editor Popup -->
        <div id="configPopup" class="popup-overlay" style="display: none;">
            <div class="popup-content config-popup-content">
                <button id="closeConfigPopup" class="close-button">&times;</button>
                <h2>Configuration</h2>
                <div id="configEditor" class="config-editor">
                    <!-- Config fields are populated dynamically from the loaded config -->
                </div>
                <div id="configSaveStatus" aria-live="polite"></div>
                <button id="saveConfigButton" type="button">Save</button>
            </div>
        </div>

        <!-- Scripts -->
        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/jquery.scrolly.min.js"></script>
        <script src="assets/js/jquery.poptrox.min.js"></script>
        <script src="assets/js/skel.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/socket.io.min.js"></script>
        <script src="assets/js/animatronic.js"></script>
        <script src="assets/js/main.js"></script>
    </body>
</html>
